---
apiVersion: v1
kind: Secret
metadata:
  name: dashboard-dspa-secret
  namespace: {{ .Values.namespace }}
type: Opaque
stringData:
  user: {{ .Values.minio.rootUser }}
  password: {{ .Values.minio.rootPassword }}
  host: minio
  port: "9000"
---
apiVersion: datasciencepipelinesapplications.opendatahub.io/v1
kind: DataSciencePipelinesApplication
metadata:
  name: dspa
  namespace: {{ .Values.namespace }}
  annotations:
    helm.sh/resource-policy: keep
spec:
  apiServer:
    deploy: true
    enableOauth: true
    enableSamplePipeline: false
  database:
    disableHealthCheck: false
    mariaDB:
      deploy: true
      pipelineDBName: mlpipeline
      pvcSize: 10Gi
      username: mlpipeline
  dspVersion: v2
  objectStorage:
    disableHealthCheck: false
    externalStorage:
      basePath: ""
      bucket: {{ .Values.minio.bucket }}pipelines
      host: {{ .Values.minio.service }}.{{ .Values.minio.rootUser }}
      port: "9000"
      region: us-east-1
      s3CredentialsSecret:
        accessKey: AWS_ACCESS_KEY_ID
        secretKey: AWS_SECRET_ACCESS_KEY
        secretName: dashboard-dspa-secret
      scheme: http
  persistenceAgent:
    deploy: true
    numWorkers: 2
  scheduledWorkflow:
    cronScheduleTimezone: UTC
    deploy: true

