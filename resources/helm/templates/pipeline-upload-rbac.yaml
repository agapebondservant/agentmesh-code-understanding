---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: pipeline-upload-job
  namespace: {{ .Values.namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: pipeline-upload-job-admin
  namespace: {{ .Values.namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: admin
subjects:
  - kind: ServiceAccount
    name: pipeline-upload-job
    namespace: {{ .Values.namespace }}
