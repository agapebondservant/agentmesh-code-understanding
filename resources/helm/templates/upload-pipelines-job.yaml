---
apiVersion: batch/v1
kind: Job
metadata:
  name: upload-kubeflow-pipelines
  namespace: {{ .Values.namespace }}
spec:
  backoffLimit: 0
  template:
    spec:
      restartPolicy: Never
      initContainers:
        - name: wait-for-kfp
          image: busybox
          command:
            - sh
            - -c
            - |
              ELAPSED=0
              until wget -q --tries=1 --timeout=5 -O /dev/null "${KFP_HOST}/apis/v2beta1/healthz" 2>/dev/null; do
                if [ "$ELAPSED" -ge 60 ]; then
                  echo "Error: KFP_HOST ${KFP_HOST} not accessible after 60s" >&2
                  exit 1
                fi
                sleep 5
                ELAPSED=$((ELAPSED + 5))
              done
              echo "KFP is accessible at ${KFP_HOST}"
          envFrom:
            - secretRef:
                name: code-understanding-env
      containers:
        - name: upload-pipelines
          image: registry.access.redhat.com/ubi9/python-311
          command:
            - sh
            - -c
            - |
              pip install --quiet kfp jupyter
              git config --global --add safe.directory /opt/app-root/src
              git -C /opt/app-root/src init
              git -C /opt/app-root/src remote add origin "{{ .Values.repoUrl }}" 2>/dev/null || true
              git -C /opt/app-root/src fetch origin "{{ .Values.repoRef }}"
              git -C /opt/app-root/src reset --hard FETCH_HEAD
              workflows/examples/code_understanding/run_pipelines.sh --upload-single --upload-aggregated
          workingDir: /opt/app-root/src
          envFrom:
            - secretRef:
                name: code-understanding-env
          volumeMounts:
            - name: workspace
              mountPath: /opt/app-root/src
      volumes:
        - name: workspace
          emptyDir: {}
