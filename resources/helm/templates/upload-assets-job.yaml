---
apiVersion: batch/v1
kind: Job
metadata:
  name: upload-assets
  namespace: {{ .Values.namespace }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  backoffLimit: 0
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: upload-assets
          image: registry.access.redhat.com/ubi9/python-311
          command:
            - sh
            - -c
            - |
              pip install --quiet "mlflow[kubernetes]>=3.11"
              git config --global --add safe.directory /opt/app-root/src
              git -C /opt/app-root/src init
              git -C /opt/app-root/src remote add origin "${REPO_URL}" 2>/dev/null || true
              git -C /opt/app-root/src fetch origin "${REPO_REF}"
              git -C /opt/app-root/src reset --hard FETCH_HEAD
              python - <<'PYEOF'
              import sys, os, mlflow
              sys.path.insert(0, '/opt/app-root/src/workflows/examples/code_understanding')
              from loaders.mlflow_asset_loader import MlFlowAssetLoader

              mlflow.set_tracking_uri(os.getenv("MLFLOW_TRACKING_URI", "https://mlflow.redhat-ods-applications.svc:8443"))

              MlFlowAssetLoader().upload_all_assets("workflows/examples/code_understanding/assets")
              PYEOF
          workingDir: /opt/app-root/src
          env:
            - name: REPO_URL
              value: "{{ .Values.repoUrl }}"
            - name: REPO_REF
              value: "{{ .Values.repoRef }}"
            - name: MLFLOW_TRACKING_INSECURE_TLS
              value: "true"
            - name: MLFLOW_WORKSPACE
              value: "{{ .Values.namespace }}"
          envFrom:
            - secretRef:
                name: code-understanding-env
          volumeMounts:
            - name: workspace
              mountPath: /opt/app-root/src
      volumes:
        - name: workspace
          emptyDir: {}
